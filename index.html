<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="robots" content="noindex, nofollow">
  <meta name="color-scheme" content="light dark">
  <meta name="theme-color" content="#faf8f2" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#14201b" media="(prefers-color-scheme: dark)">
  <title>Ledgerbook</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="stylesheet" href="styles/tokens.css">
  <link rel="stylesheet" href="styles/screen.css">
  <link rel="stylesheet" href="styles/print.css" media="print">
  <script>
    /* Apply the saved theme before first paint to avoid a flash. */
    try {
      var t = localStorage.getItem('ledgerbook.theme');
      if (t === 'dark' || t === 'light') document.documentElement.dataset.theme = t;
    } catch (e) {}
  </script>
</head>
<body>
  <a class="skip-link" href="#content"></a>

  <header class="topbar">
    <button class="icon-btn" id="nav-toggle" aria-expanded="true" aria-controls="sidebar" aria-label="Toggle navigation">
      <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M3 6h18M3 12h18M3 18h18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <a class="brand" href="#/" id="brand-link"></a>
    <span class="topbar-crumb" id="topbar-crumb"></span>
    <button class="icon-btn" id="theme-toggle" aria-label="Switch color theme"></button>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar" aria-label="">
      <div class="sidebar-search">
        <svg class="search-icon" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true"><circle cx="11" cy="11" r="7" fill="none" stroke="currentColor" stroke-width="2"/><path d="M20 20l-3.5-3.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <input type="search" id="search-input" placeholder="Search all topics…" autocomplete="off" spellcheck="false" aria-label="Search all topics">
      </div>
      <ul class="search-results" id="search-results" hidden></ul>
      <div class="sidebar-nav" id="sidebar-nav"></div>
    </nav>
    <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>
    <main class="content" id="content" tabindex="-1"></main>
  </div>

  <div class="print-root" id="print-root" aria-hidden="true"></div>

  <script src="vendor/marked.min.js"></script>
  <script src="vendor/mermaid.min.js"></script>
  <script type="module" src="app/main.js"></script>
</body>
</html>
